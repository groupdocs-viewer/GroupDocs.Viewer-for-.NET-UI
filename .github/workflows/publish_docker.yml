name: Publish Docker Image

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  publish_docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "ghcr=ghcr.io/${OWNER,,}/viewer-ui" >> $GITHUB_OUTPUT
          echo "dockerhub=${{ secrets.DOCKERHUB_USERNAME }}/viewer-ui" >> $GITHUB_OUTPUT

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep -oP '<GroupDocsViewerUI>\K[^<]+' build/dependencies.props)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.images.outputs.ghcr }}:${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.ghcr }}:latest
            ${{ steps.images.outputs.dockerhub }}:${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.dockerhub }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
